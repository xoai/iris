name: release

# Publishes to npm when a version tag is pushed. The git tag and the npm version
# are kept in sync: the job fails unless `vX.Y.Z` matches packages/cli/package.json
# (bump both with `node scripts/version.mjs X.Y.Z` before tagging). Publishing is
# idempotent — if the version is already on the registry, it skips npm publish and
# only cuts the GitHub Release (so a back-fill tag for an already-published version
# is safe).
#
# Prerequisite: add an npm **Automation** access token as the repo secret
# `NPM_TOKEN` (Settings → Secrets and variables → Actions). An automation token
# bypasses 2FA, which is required for non-interactive publishing.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::git tag v$TAG does not match package.json version $PKG — run 'node scripts/version.mjs $TAG' and commit before tagging"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test

      - name: Publish to npm (skip if this version is already live)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VER="$(node -p "require('./packages/cli/package.json').version")"
          if npm view "iris-runtime@$VER" version >/dev/null 2>&1; then
            echo "iris-runtime@$VER is already published — skipping npm publish (idempotent re-tag)."
          else
            IRIS_PUBLISH=1 npm run release
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
