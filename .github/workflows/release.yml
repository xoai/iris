name: release

# Publishes to npm when a version tag is pushed. The git tag and the npm version
# are kept in sync: the job fails unless `vX.Y.Z` matches packages/cli/package.json
# (bump both with `node scripts/version.mjs X.Y.Z` before tagging). Publishing is
# idempotent — if the version is already on the registry, it skips npm publish and
# only cuts the GitHub Release (so a back-fill tag for an already-published version
# is safe).
#
# Prerequisite: add an npm **Automation** access token as the repo secret
# `NPM_TOKEN` (Settings → Secrets and variables → Actions). An automation token
# bypasses 2FA, which is required for non-interactive publishing.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::git tag v$TAG does not match package.json version $PKG — run 'node scripts/version.mjs $TAG' and commit before tagging"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test

      # Idempotent at the PACKAGE level: scripts/release.mjs skips every package
      # already live at this version and publishes only the rest (with E429
      # back-off). So re-pushing the tag safely COMPLETES a partial release — the
      # case where npm rate-limited mid-batch and only some packages went out.
      - name: Publish to npm (per-package idempotent — re-run completes a partial release)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: IRIS_PUBLISH=1 npm run release

      # Release notes come from the matching CHANGELOG section, so the GitHub
      # Release reads identically to CHANGELOG.md. Falls back to GitHub's
      # auto-generated notes if the tagged version has no CHANGELOG entry.
      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v sec="$VER" '
            $0 ~ "^## \\[" sec "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f && /^\[[^]]*\]: / {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "from_changelog=true" >> "$GITHUB_OUTPUT"
            echo "notes: CHANGELOG [$VER] section ($(wc -l < RELEASE_NOTES.md) lines)"
          else
            echo "from_changelog=false" >> "$GITHUB_OUTPUT"
            echo "::warning::no CHANGELOG [$VER] section — falling back to auto-generated notes"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.from_changelog == 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.from_changelog != 'true' }}
